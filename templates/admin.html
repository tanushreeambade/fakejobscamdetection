body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 40px;
}

form {
    background: white;
    padding: 20px;
    width: 400px;
    margin: auto;
}

input, textarea, button {
    width: 100%;
    margin: 8px 0;
    padding: 8px;
}

button {
    background: #e63946;
    color: white;
    border: none;
    cursor: pointer;
}
